<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BITSYNC Creations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="glass-header">
        <nav class="navbar container">
            <div class="logo">
                <i class="fa-solid fa-code"></i>
                BITSYNC<span>.</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Portfolio</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-padding container section-padding">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h1 class="gradient-text">Let's Connect</h1>
                <p>Ready to start your next big project? Drop us a message, and let's craft something amazing together.</p>
                
                <div class="contact-details">
                    <div class="detail-item">
                        <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
                        <div>
                            <h4>Email Us</h4>
                            <p>hello@bitsync.dev</p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="icon-box"><i class="fa-solid fa-location-dot"></i></div>
                        <div>
                            <h4>Visit Us</h4>
                            <p>Cyber Hub, Tech District, SL</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card contact-form-container">
                <form action="#" method="POST" class="advanced-form">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required placeholder="John Doe">
                        </div>
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="john@example.com">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required placeholder="Project Inquiry">
                    </div>
                    
                    <div class="input-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Tell us about your project..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">
                        Send Message <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">BITSYNC<span>.</span></div>
            <p>&copy; 2026 BITSYNC Creations. All rights reserved.</p>
            <div class="social-links">
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-dribbble"></i></a>
            </div>
        </div>
    </footer>
</body>
</html>
